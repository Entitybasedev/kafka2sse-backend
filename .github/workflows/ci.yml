name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run ruff
        run: poetry run ruff check .

      - name: Run tests
        run: poetry run pytest

      - name: Run fuzz tests
        run: poetry run pytest src/tests/test_fuzz.py -v
