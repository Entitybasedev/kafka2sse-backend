name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 20

      - name: Install poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run ruff
        run: poetry run ruff check .

      - name: Run unit tests
        run: poetry run pytest src/tests/unit/ -v

      - name: Run contract tests (fuzz)
        run: poetry run pytest src/tests/contract/ -v

      - name: Run integration tests
        run: poetry run pytest src/tests/integration/ -v || true

      - name: Stop services
        if: always()
        run: docker compose down
